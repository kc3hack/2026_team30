services:

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    depends_on:
      - emotion-api
    environment:
      - PYTHON_API_URL=http://emotion-api:8000

  emotion-api:
    build: ./emotion-api
    ports:
      - "8000:8000"
    env_file:
      - ./emotion-api/.env
