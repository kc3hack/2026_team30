services:

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    depends_on:
      - emotion-api
      - db
    environment:
      - PYTHON_API_URL=http://emotion-api:8000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/app_db

  emotion-api:
    build: ./emotion-api
    ports:
      - "8000:8000"
    env_file:
      - ./emotion-api/.env

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
